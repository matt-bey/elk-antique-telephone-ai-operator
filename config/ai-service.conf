[conversation]
# Conversation provider: anthropic (default) or ollama (local fallback)
provider = anthropic

# Model name — Haiku is fast and cheap for operator turns
model = claude-haiku-4-5-20251001

# Ollama host (only used when provider = ollama)
host = http://localhost:11434

[tts]
# Piper TTS voice — auto-downloaded on first run (~65 MB)
voice = en_US-lessac-high

[whisper]
# OpenAI Whisper speech recognition (local — no API key required)

# Model size (tiny, base, small, medium, large)
model = base

# Language for recognition (en, es, fr, etc.)
language = en

# Temperature for recognition (0.0-1.0)
temperature = 0.0

# Enable word-level timestamps
word_timestamps = false

# Minimum audio length in seconds
min_audio_length = 0.5

# Maximum audio length in seconds  
max_audio_length = 30.0

[operator]
# AI operator personality configuration

# Operator name pool (comma-separated). A random name is chosen each session,
# simulating different operators staffing Central Exchange. Leave empty to use
# the built-in default pool (Ada, Rosie, Dot, Clara, Alma, Ellie).
names = Ada, Rosie, Dot, Clara, Alma, Ellie

# Era setting (affects language patterns)
era = 1920s

# Response style (formal, casual, professional)
style = professional

# Maximum conversation context (number of exchanges)
max_context = 10

# Enable period-appropriate responses
authentic_language = true

# Response time target in seconds
response_time_target = 2.0

# Fallback responses when AI unavailable
enable_fallback = true