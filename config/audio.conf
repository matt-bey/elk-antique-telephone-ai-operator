[audio]
# Audio system configuration for antique telephone AI operator

# Sample rate in Hz (22050, 44100, 48000)
sample_rate = 44100

# Number of audio channels (1 = mono, 2 = stereo)
channels = 1

# Audio buffer size in frames (larger = more latency, more stable)
chunk_size = 1024

# Input device name or 'default'
input_device = default

# Output device name or 'default'  
output_device = default

# Master volume (0.0 to 1.0)
volume = 0.8

# Input gain multiplier for microphone sensitivity
input_gain = 1.0

# Noise gate threshold (0-32767, 0 = disabled)
noise_gate = 100

# Audio format (16-bit signed PCM)
format = int16

# Enable noise gate (zeros samples below noise_gate threshold)
enable_noise_gate = true

# Auto gain control — not yet implemented (Phase 4 hardware integration)
# enable_auto_gain = false

# Latency target in milliseconds
target_latency = 50