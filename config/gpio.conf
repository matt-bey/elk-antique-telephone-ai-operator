[gpio]
# GPIO pin configuration for antique telephone hardware

# Crank detection pin (BCM numbering)
crank_pin = 18

# Hook switch detection pin (on-hook/off-hook)
hook_pin = 19

# Status LED pin (indicates system state)
status_led_pin = 20

# Ringer control pin (drives antique bell mechanism)
ringer_pin = 21

# Debounce time in milliseconds
debounce_time = 50

# Pull-up resistor configuration
use_internal_pullup = true

# GPIO mode (BCM or BOARD numbering)
pin_mode = BCM

# Advanced settings for antique hardware integration

# Crank detection sensitivity (number of pulses to register)
crank_pulse_threshold = 1

# Hook switch active state (true = active high, false = active low)
hook_active_high = false

# Ringer pulse duration in milliseconds
ringer_pulse_duration = 500

# Ringer pause between pulses in milliseconds  
ringer_pulse_pause = 500

# Number of ringer pulses for incoming call
ringer_pulse_count = 3

# Status LED blink pattern (on_ms,off_ms)
status_led_idle_pattern = 1000,2000
status_led_active_pattern = 200,200
status_led_error_pattern = 100,100