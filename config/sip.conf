[sip]
# SIP/VoIP configuration for telephone calling
# Defaults tuned for Callcentric (sip.callcentric.net)

# SIP account credentials — set via environment or .env file
# SIP_USERNAME, SIP_PASSWORD map to sip.username / sip.password
username =
password =

# SIP server domain — override with SIP_DOMAIN env var
# Default: sip.callcentric.net (DNS SRV enabled on their network)
domain = sip.callcentric.net
port = 5060
transport = udp

# Registration settings
register = true
register_expiry = 1800

# Audio codec preferences — Callcentric supports G.711 µ-law and A-law
codecs = PCMU,PCMA

# DTMF — RFC 2833 with Callcentric's payload type
dtmf_mode = rfc2833
dtmf_payload = 101

# NAT traversal — Callcentric recommends STUN OFF
enable_stun = false

# RTP audio port range
rtp_port_min = 10000
rtp_port_max = 20000

# Call settings
auto_answer = false
answer_delay = 2.0
hangup_delay = 1.0

# Audio quality settings
echo_cancellation = true
noise_suppression = true
voice_activity_detection = true

# Advanced SIP settings
user_agent = AntiquePhone-AI-Operator/1.0
session_timeout = 300
keep_alive_interval = 30

[voip]
# VoIP call management settings

# Maximum simultaneous calls
max_calls = 1

# Call recording (for testing/debugging)
enable_recording = false
recording_path = /tmp/antique_phone_recordings

# Call statistics
enable_stats = true
stats_interval = 5

# Quality monitoring
jitter_threshold = 50
packet_loss_threshold = 5
audio_level_monitoring = true